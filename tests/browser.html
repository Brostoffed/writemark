<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>&lt;writemark-editor&gt; Live Inline Browser Tests</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
    body { margin: 0; padding: 24px; background: Canvas; color: CanvasText; }
    main { max-width: 1160px; margin: auto; }
    table { border-collapse: collapse; width: 100%; margin-top: 16px; }
    th, td { border: 1px solid color-mix(in srgb, CanvasText 20%, Canvas 80%); padding: 8px; vertical-align: top; }
    code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    pre { margin: 0; white-space: pre-wrap; }
    .file-warning { display: none; border: 1px solid #b45309; background: color-mix(in srgb, #f59e0b 16%, Canvas 84%); border-radius: 10px; padding: 12px 14px; }
    html.file-protocol .file-warning { display: block; }
    .pass { color: #097a2d; }
    .fail { color: #b00020; }
    writemark-editor { position: absolute; left: -9999px; top: -9999px; width: 800px; --md-editor-min-height: 300px; }
  </style>
</head>
<body>
  <main>
    <h1>&lt;writemark-editor&gt; live inline browser tests</h1>
    <p>Serve this file over <code>http://localhost</code>. The test harness exercises action fixtures and verifies rendered live-editor structure.</p>
    <div class="file-warning" role="alert">This test harness imports <code>writemark-editor.js</code> as an ES module, so it cannot run from <code>file://</code>.</div>
    <writemark-editor id="editor" mode="live" preview="none"></writemark-editor>
    <div id="summary"></div>
    <table>
      <thead><tr><th>Result</th><th>Name</th><th>Expected</th><th>Actual</th></tr></thead>
      <tbody id="results"></tbody>
    </table>
  </main>

  <script type="module">
    if (location.protocol === "file:") {
      document.documentElement.classList.add("file-protocol");
      throw new Error("Serve tests/browser.html over http://localhost.");
    }
    await import("../dist/writemark-editor.js");
    const { bindDemoControls } = await import("../scripts/demo-controls.js");
    await customElements.whenDefined('writemark-editor');
    const editor = document.querySelector('#editor');
    const compatibilityModule = await import("../dist/md-live-editor.js");
    const fixtures = [
      { name: 'continues bullet list', before: '- one|', action: 'editor.smartEnter', after: '- one\n- |' },
      { name: 'exits empty bullet list', before: '- one\n- |', action: 'editor.smartEnter', after: '- one\n|' },
      { name: 'continues ordered list and increments', before: '3. alpha|', action: 'editor.smartEnter', after: '3. alpha\n4. |' },
      { name: 'exits empty ordered list', before: '1. alpha\n2. |', action: 'editor.smartEnter', after: '1. alpha\n|' },
      { name: 'continues checked task as unchecked', before: '- [x] done|', action: 'editor.smartEnter', after: '- [x] done\n- [ ] |' },
      { name: 'exits empty task list', before: '- [ ] |', action: 'editor.smartEnter', after: '|' },
      { name: 'continues blockquote', before: '> quoted|', action: 'editor.smartEnter', after: '> quoted\n> |' },
      { name: 'exits empty blockquote', before: '> |', action: 'editor.smartEnter', after: '|' },
      { name: 'heading enter creates paragraph break', before: '## title|', action: 'editor.smartEnter', after: '## title\n\n|' },
      { name: 'enter inside code fence is raw newline', before: '```\nconst x = 1;|\n```', action: 'editor.smartEnter', after: '```\nconst x = 1;\n|\n```' },
      { name: 'opening code fence auto-closes', before: '```python|', action: 'editor.smartEnter', after: '```python\n|\n```' },
      { name: 'tab indents list item', before: '- a\n- b|', action: 'editor.smartTab', after: '- a\n  - b|' },
      { name: 'shift tab outdents list item', before: '- a\n  - b|', action: 'editor.smartOutdent', after: '- a\n- b|' },
      { name: 'backspace removes list marker', before: '- |item', action: 'editor.smartBackspace', after: '|item' },
      { name: 'backspace at start of paragraph joins previous line', before: 'alpha\n|beta', action: 'editor.smartBackspace', after: 'alpha|beta' },
      { name: 'backspace at empty line start joins previous line', before: 'alpha\n|', action: 'editor.smartBackspace', after: 'alpha|' },
      { name: 'delete at end of line joins next line', before: 'alpha|\nbeta', action: 'editor.smartDelete', after: 'alpha|beta' },
      { name: 'markdown shortcut converts task brackets', before: '[]|', action: 'editor.markdownShortcut', after: '- [ ] |' },
      { name: 'markdown shortcut adds heading space', before: '##|', action: 'editor.markdownShortcut', after: '## |' },
      { name: 'bold insertion no selection', before: 'hello |', action: 'inline.bold', after: 'hello **|**' },
      { name: 'bold wraps selection', before: 'hello [world]', action: 'inline.bold', after: 'hello **world**|' },
      { name: 'link wraps selection with pasted URL', before: '[OpenAI]', action: 'inline.link', args: { url: 'https://openai.com' }, after: '[OpenAI](https://openai.com)|' },
      { name: 'code fence wraps selection', before: '[const x = 1;]', action: 'block.codeFence', after: '```\nconst x = 1;|\n```' },
      { name: 'table insertion includes delimiter and body row', before: '|', action: 'block.table', args: { rows: 1, cols: 2 }, after: '| [Column 1] | Column 2 |\n| --- | --- |\n| Cell 1 | Cell 2 |' },
      { name: 'delete selection removes selected markdown', before: '[# Title\n\nBody]', action: 'editor.deleteSelection', after: '|' },
      { name: 'smart delete removes selected markdown', before: '[# Title\n\nBody]', action: 'editor.smartDelete', after: '|' },
      { name: 'smart backspace removes selected markdown', before: '[# Title\n\nBody]', action: 'editor.smartBackspace', after: '|' }
    ];

    const results = fixtures.map(fixture => editor.runFixture(fixture));

    const visualChecks = [];
    function pressLiveKey(key, init = {}) {
      const event = new KeyboardEvent('keydown', { key, bubbles: true, cancelable: true, ...init });
      editor.shadowRoot.querySelector('.live-editor').dispatchEvent(event);
      return event.defaultPrevented;
    }

    function pressSourceKey(key, init = {}) {
      const event = new KeyboardEvent('keydown', { key, bubbles: true, cancelable: true, ...init });
      editor.shadowRoot.querySelector('textarea').dispatchEvent(event);
      return event.defaultPrevented;
    }

    function pointForSourceOffset(offset) {
      const rect = editor._caretRectForSourceOffset(offset);
      if (rect) return { x: rect.left, y: (rect.top + rect.bottom) / 2 };
      const pos = editor._domPositionFromSource(offset);
      const box = pos?.editable?.getBoundingClientRect();
      return box ? { x: box.left + 2, y: box.top + box.height / 2 } : { x: 0, y: 0 };
    }

    function dragLiveSelection(from, to) {
      const start = pointForSourceOffset(from);
      const end = pointForSourceOffset(to);
      const eventInit = point => ({ button: 0, buttons: 1, clientX: point.x, clientY: point.y, bubbles: true, cancelable: true, composed: true });
      editor.shadowRoot.querySelector('.live-editor').dispatchEvent(new MouseEvent('mousedown', eventInit(start)));
      document.dispatchEvent(new MouseEvent('mousemove', eventInit(end)));
      document.dispatchEvent(new MouseEvent('mouseup', { ...eventInit(end), buttons: 0 }));
    }

    editor.value = '# H1\n\n## H2\n\n**bold** and *italic* and `code`\n\n---\n\n| A | B |\n| --- | --- |\n| C | D |\n\n```python\nprint(1)\n```\n\n- [ ] task';
    await new Promise(requestAnimationFrame);
    const root = editor.shadowRoot;
    visualChecks.push({ name: 'writemark-editor custom element is registered', passed: Boolean(customElements.get('writemark-editor')) });
    visualChecks.push({ name: 'legacy md-live-editor alias remains registered', passed: Boolean(customElements.get('md-live-editor')) && Boolean(compatibilityModule.WritemarkEditorElement) && Boolean(compatibilityModule.MdLiveEditorElement) });
    visualChecks.push({ name: 'live editor renders H1 class', passed: Boolean(root.querySelector('.md-h1')) });
    visualChecks.push({ name: 'live editor renders H2 class', passed: Boolean(root.querySelector('.md-h2')) });
    visualChecks.push({ name: 'live editor decorates bold', passed: Boolean(root.querySelector('strong')) });
    visualChecks.push({ name: 'live editor decorates italic', passed: Boolean(root.querySelector('em')) });
    visualChecks.push({ name: 'live editor decorates inline code', passed: Boolean(root.querySelector('.md-line code')) });
    visualChecks.push({ name: 'live editor renders table grid', passed: Boolean(root.querySelector('.md-table')) });
    visualChecks.push({ name: 'live editor renders code block', passed: Boolean(root.querySelector('.md-code-block')) });
    visualChecks.push({ name: 'live code block hides raw fence markers', passed: !(root.querySelector('.md-code-block')?.textContent || '').includes('```') });
    visualChecks.push({ name: 'live code block renders language header', passed: (root.querySelector('.md-code-label')?.textContent || '') === 'python' });
    visualChecks.push({ name: 'live editor renders task checkbox', passed: Boolean(root.querySelector('[data-task-checkbox]')) });
    visualChecks.push({ name: 'live horizontal rule renders divider', passed: Boolean(root.querySelector('.md-hr-line')) });
    visualChecks.push({ name: 'live horizontal rule hides raw marker text', passed: ((root.querySelector('.md-hr-line')?.innerText || root.querySelector('.md-hr-line')?.textContent || '').trim() === '') });
    visualChecks.push({ name: 'live horizontal rule is not a text-editable row', passed: !root.querySelector('.md-hr-line')?.hasAttribute('data-editable') });
    const focusedLine = root.querySelector('.md-line');
    focusedLine?.focus();
    visualChecks.push({ name: 'active live line has no default blue inset focus ring', passed: focusedLine ? getComputedStyle(focusedLine).boxShadow === 'none' : false });
    editor.setSelectionRange(1, 1);
    await new Promise(requestAnimationFrame);
    visualChecks.push({ name: 'component renders no global toolbar', passed: !root.querySelector('[part=\"toolbar\"]') && !root.querySelector('[part=\"mobile-toolbar\"]') });
    visualChecks.push({ name: 'code block renders no embedded action buttons', passed: !root.querySelector('[data-code-copy]') && !root.querySelector('[data-code-lang]') });
    visualChecks.push({ name: 'table renders no embedded table controls', passed: !root.querySelector('[data-table-action]') });

    editor.mode = 'live';
    editor.preview = 'none';
    editor.value = '';
    await new Promise(requestAnimationFrame);
    const emptyLine = root.querySelector('[data-kind="blank"]');
    visualChecks.push({
      name: 'empty live editor exposes placeholder without inserting placeholder text',
      passed: emptyLine?.dataset.placeholder === editor.placeholder && editor.value === '' && editor.shadowRoot.querySelectorAll('[data-editable]').length === 1
    });

    editor.mode = 'split';
    editor.preview = 'none';
    editor.value = '# Split mode';
    await new Promise(requestAnimationFrame);
    visualChecks.push({
      name: 'split mode shows source textarea and preview without live editor',
      passed: getComputedStyle(root.querySelector('.live-editor')).display === 'none'
        && getComputedStyle(root.querySelector('textarea')).display === 'block'
        && getComputedStyle(root.querySelector('.preview')).display === 'block'
        && root.querySelector('.preview h1')?.textContent === 'Split mode'
    });

    editor.mode = 'preview';
    await new Promise(requestAnimationFrame);
    editor.focus();
    await new Promise(requestAnimationFrame);
    visualChecks.push({
      name: 'preview mode focus targets rendered preview surface',
      passed: root.activeElement === root.querySelector('.preview')
    });

    editor.mode = 'live';
    editor.required = true;
    editor.value = '';
    await new Promise(requestAnimationFrame);
    const requiredMessageInitiallyHidden = root.querySelector('.validation').textContent === '' && root.querySelector('.live-editor').getAttribute('aria-invalid') === 'true';
    const reportValidityResult = editor.reportValidity();
    const requiredMessageAfterReport = root.querySelector('.validation').textContent === 'Please fill out this field.';
    visualChecks.push({
      name: 'required validation message is hidden until reported',
      passed: requiredMessageInitiallyHidden && reportValidityResult === false && requiredMessageAfterReport
    });
    editor.required = false;

    editor.value = '1. one\n2. two\n\nwrapped\nparagraph\n\n| A | B |\n| --- | --- |\n| C | D |';
    await new Promise(requestAnimationFrame);
    const renderedDoc = new DOMParser().parseFromString(editor.getHTML(), 'text/html');
    visualChecks.push({
      name: 'preview renderer groups ordered list items into one ol',
      passed: renderedDoc.querySelectorAll('ol').length === 1
        && renderedDoc.querySelectorAll('ol > li').length === 2
        && !renderedDoc.querySelector('ul > li')
    });
    visualChecks.push({
      name: 'preview renderer keeps soft-wrapped paragraph as one paragraph',
      passed: [...renderedDoc.querySelectorAll('p')].some(p => p.textContent.replace(/\s+/g, ' ').trim() === 'wrapped paragraph')
    });
    visualChecks.push({
      name: 'plain text extraction preserves table row and cell separators',
      passed: editor.getText() === 'one\ntwo\n\nwrapped\nparagraph\n\nA\tB\nC\tD'
    });

    editor.value = '```js\nconsole.log(1)\n```';
    await new Promise(requestAnimationFrame);
    editor.setSelectionRange(5, 5);
    const setLanguageWorked = editor.exec('code.setLanguage', { language: 'python' });
    visualChecks.push({
      name: 'code.setLanguage updates opening fence language',
      passed: setLanguageWorked && editor.value === '```python\nconsole.log(1)\n```'
    });

    editor.value = '| A | B | C |\n| --- | --- | --- |\n| 1 | 2 | 3 |';
    await new Promise(requestAnimationFrame);
    const middleCellOffset = editor.value.indexOf('2');
    editor.setSelectionRange(middleCellOffset, middleCellOffset + 1);
    editor.exec('table.deleteColumn');
    visualChecks.push({
      name: 'table.deleteColumn targets selected table column',
      passed: editor.value === '| A | C |\n| --- | --- |\n| 1 | 3 |'
    });

    editor.value = '| A | B |\n| --- | --- |\n| 1 | 2 |\n| 3 | 4 |';
    await new Promise(requestAnimationFrame);
    const secondRowOffset = editor.value.indexOf('3');
    editor.setSelectionRange(secondRowOffset, secondRowOffset + 1);
    editor.exec('table.deleteRow');
    visualChecks.push({
      name: 'table.deleteRow targets selected table row',
      passed: editor.value === '| A | B |\n| --- | --- |\n| 1 | 2 |'
    });

    editor.markdownFlavor = 'commonmark';
    editor.value = '| A | B |\n| --- | --- |\n- [ ] task\n~~strike~~';
    await new Promise(requestAnimationFrame);
    const commonmarkDoc = new DOMParser().parseFromString(editor.getHTML(), 'text/html');
    visualChecks.push({
      name: 'commonmark mode does not render GFM table task checkbox or strikethrough',
      passed: !commonmarkDoc.querySelector('table')
        && !commonmarkDoc.querySelector('input[type="checkbox"]')
        && !commonmarkDoc.querySelector('del')
    });
    editor.markdownFlavor = 'gfm';
    editor.mode = 'live';
    editor.preview = 'none';

    editor.value = '__bold__ and _italic_';
    await new Promise(requestAnimationFrame);
    const underscoreDoc = new DOMParser().parseFromString(editor.getHTML(), 'text/html');
    visualChecks.push({
      name: 'preview renderer supports underscore strong and emphasis',
      passed: underscoreDoc.querySelector('strong')?.textContent === 'bold'
        && underscoreDoc.querySelector('em')?.textContent === 'italic'
    });
    visualChecks.push({
      name: 'live renderer supports underscore strong and emphasis',
      passed: editor.shadowRoot.querySelector('strong')?.textContent === 'bold'
        && editor.shadowRoot.querySelector('em')?.textContent === 'italic'
    });

    editor.value = 'Setext H1\n=\n\nSetext H2\n---';
    await new Promise(requestAnimationFrame);
    const setextDoc = new DOMParser().parseFromString(editor.getHTML(), 'text/html');
    visualChecks.push({
      name: 'preview renderer supports setext h1 and h2 headings',
      passed: setextDoc.querySelector('h1')?.textContent === 'Setext H1'
        && setextDoc.querySelector('h2')?.textContent === 'Setext H2'
        && !setextDoc.querySelector('hr')
    });
    visualChecks.push({
      name: 'live renderer supports setext h1 and h2 headings',
      passed: editor.shadowRoot.querySelector('.md-h1')?.textContent === 'Setext H1'
        && editor.shadowRoot.querySelector('.md-h2')?.textContent === 'Setext H2'
        && !editor.shadowRoot.querySelector('.md-hr-line')
    });

    editor.value = '~~~js\nconsole.log(1)\n~~~';
    await new Promise(requestAnimationFrame);
    const tildeFenceDoc = new DOMParser().parseFromString(editor.getHTML(), 'text/html');
    visualChecks.push({
      name: 'preview renderer supports tilde fenced code blocks',
      passed: tildeFenceDoc.querySelector('pre > code.language-js')?.textContent === 'console.log(1)'
        && !tildeFenceDoc.querySelector('del')
    });
    visualChecks.push({
      name: 'live renderer supports tilde fenced code blocks',
      passed: editor.shadowRoot.querySelector('.md-code-block')?.dataset.language === 'js'
        && editor.shadowRoot.querySelector('.md-code-label')?.textContent === 'js'
    });
    editor.setSelectionRange(5, 5);
    const tildeSetLanguageWorked = editor.exec('code.setLanguage', { language: 'python' });
    visualChecks.push({
      name: 'code.setLanguage preserves tilde fence marker',
      passed: tildeSetLanguageWorked && editor.value === '~~~python\nconsole.log(1)\n~~~'
    });
    editor.value = '~~~';
    editor.setSelectionRange(editor.value.length, editor.value.length);
    const smartEnterClosedTildeFence = editor.exec('editor.smartEnter');
    visualChecks.push({
      name: 'smart Enter closes tilde fence with matching marker',
      passed: smartEnterClosedTildeFence && editor.value === '~~~\n\n~~~'
    });

    editor.value = '[](https://example.com) [x](https://example.com/a(b)) ![alt](https://example.com/a(b).png "Title")';
    await new Promise(requestAnimationFrame);
    const nestedLinkDoc = new DOMParser().parseFromString(editor.getHTML(), 'text/html');
    const nestedLinks = nestedLinkDoc.querySelectorAll('a');
    const nestedImage = nestedLinkDoc.querySelector('img');
    visualChecks.push({
      name: 'preview renderer supports empty labels and nested parentheses in links',
      passed: nestedLinks.length === 2
        && nestedLinks[0].textContent === ''
        && nestedLinks[0].getAttribute('href') === 'https://example.com'
        && nestedLinks[1].textContent === 'x'
        && nestedLinks[1].getAttribute('href') === 'https://example.com/a(b)'
    });
    visualChecks.push({
      name: 'preview renderer supports nested parentheses and titles in images',
      passed: nestedImage?.getAttribute('src') === 'https://example.com/a(b).png'
        && nestedImage?.getAttribute('alt') === 'alt'
        && nestedImage?.getAttribute('title') === 'Title'
    });
    visualChecks.push({
      name: 'live renderer decorates nested-parenthesis links without truncating URLs',
      passed: editor.shadowRoot.querySelectorAll('.md-url')[1]?.textContent === 'https://example.com/a(b)'
        && editor.shadowRoot.querySelectorAll('.md-url')[2]?.textContent === 'https://example.com/a(b).png'
    });

    editor.value = '| L | C | R |\n| :--- | :---: | ---: |\n| a | b | c |';
    await new Promise(requestAnimationFrame);
    const alignedTableDoc = new DOMParser().parseFromString(editor.getHTML(), 'text/html');
    const previewHeadCells = alignedTableDoc.querySelectorAll('th');
    const previewBodyCells = alignedTableDoc.querySelectorAll('td');
    const liveHeadCells = editor.shadowRoot.querySelectorAll('.md-table th');
    visualChecks.push({
      name: 'preview renderer applies GFM table column alignment',
      passed: previewHeadCells[0]?.style.textAlign === 'left'
        && previewHeadCells[1]?.style.textAlign === 'center'
        && previewHeadCells[2]?.style.textAlign === 'right'
        && previewBodyCells[0]?.style.textAlign === 'left'
        && previewBodyCells[1]?.style.textAlign === 'center'
        && previewBodyCells[2]?.style.textAlign === 'right'
    });
    visualChecks.push({
      name: 'live renderer applies GFM table column alignment',
      passed: liveHeadCells[0]?.style.textAlign === 'left'
        && liveHeadCells[1]?.style.textAlign === 'center'
        && liveHeadCells[2]?.style.textAlign === 'right'
    });

    editor.value = '| A | B |\n| --- | --- |\n| a\\|b | c |';
    await new Promise(requestAnimationFrame);
    const escapedPipeDoc = new DOMParser().parseFromString(editor.getHTML(), 'text/html');
    const escapedPipeLiveCell = editor.shadowRoot.querySelector('tbody .md-cell');
    visualChecks.push({
      name: 'table renderer unescapes escaped pipe characters inside cells',
      passed: escapedPipeDoc.querySelector('tbody td')?.textContent === 'a|b'
        && escapedPipeLiveCell?.textContent === 'a|b'
        && editor.getText() === 'A\tB\na|b\tc'
    });
    escapedPipeLiveCell.textContent = 'a|c';
    escapedPipeLiveCell.dispatchEvent(new InputEvent('input', { inputType: 'insertText', data: 'c', bubbles: true }));
    visualChecks.push({
      name: 'editing live table cell re-escapes pipe characters in Markdown source',
      passed: editor.value === '| A | B |\n| --- | --- |\n| a\\|c | c |'
    });

    const demoControls = document.createElement('div');
    demoControls.hidden = true;
    demoControls.innerHTML = `
      <select data-test-font-family>
        <option value='system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif' selected>System UI</option>
        <option value='Arial, Helvetica, sans-serif'>Arial</option>
      </select>
      <input data-test-font-size type="number" min="12" max="28" step="1" value="15">
      <input data-test-max-height type="number" min="220" max="1200" step="20">
    `;
    document.body.append(demoControls);
    const testFontFamily = demoControls.querySelector('[data-test-font-family]');
    const testFontSize = demoControls.querySelector('[data-test-font-size]');
    const testMaxHeight = demoControls.querySelector('[data-test-max-height]');
    bindDemoControls({ editor, fontFamily: testFontFamily, fontSize: testFontSize, maxHeight: testMaxHeight });

    testMaxHeight.value = '5';
    testMaxHeight.dispatchEvent(new InputEvent('input', { bubbles: true }));
    const maxHeightPartialStart = testMaxHeight.value === '5' && editor.style.getPropertyValue('--md-editor-max-height') === '';
    testMaxHeight.value = '52';
    testMaxHeight.dispatchEvent(new InputEvent('input', { bubbles: true }));
    const maxHeightPartialContinues = testMaxHeight.value === '52' && editor.style.getPropertyValue('--md-editor-max-height') === '';
    testMaxHeight.value = '520';
    testMaxHeight.dispatchEvent(new InputEvent('input', { bubbles: true }));
    const maxHeightComplete = testMaxHeight.value === '520' && editor.style.getPropertyValue('--md-editor-max-height') === '520px';
    testMaxHeight.value = '5';
    testMaxHeight.dispatchEvent(new Event('change', { bubbles: true }));
    const maxHeightCommitClamps = testMaxHeight.value === '220' && editor.style.getPropertyValue('--md-editor-max-height') === '220px';

    testFontSize.value = '2';
    testFontSize.dispatchEvent(new InputEvent('input', { bubbles: true }));
    const fontSizePartialStart = testFontSize.value === '2' && editor.style.getPropertyValue('--md-editor-font-size') === '15px';
    testFontSize.value = '20';
    testFontSize.dispatchEvent(new InputEvent('input', { bubbles: true }));
    const fontSizeComplete = testFontSize.value === '20' && editor.style.getPropertyValue('--md-editor-font-size') === '20px';
    testFontSize.value = '2';
    testFontSize.dispatchEvent(new Event('change', { bubbles: true }));
    const fontSizeCommitClamps = testFontSize.value === '12' && editor.style.getPropertyValue('--md-editor-font-size') === '12px';

    visualChecks.push({ name: 'Max height input preserves partial value while typing', passed: maxHeightPartialStart && maxHeightPartialContinues });
    visualChecks.push({ name: 'Max height input applies complete in-range value', passed: maxHeightComplete });
    visualChecks.push({ name: 'Max height input clamps only on commit', passed: maxHeightCommitClamps });
    visualChecks.push({ name: 'Base font size input preserves partial value while typing', passed: fontSizePartialStart });
    visualChecks.push({ name: 'Base font size input applies complete in-range value', passed: fontSizeComplete });
    visualChecks.push({ name: 'Base font size input clamps only on commit', passed: fontSizeCommitClamps });
    testFontSize.value = '15';
    testFontSize.dispatchEvent(new Event('change', { bubbles: true }));
    testMaxHeight.value = '';
    testMaxHeight.dispatchEvent(new Event('change', { bubbles: true }));

    editor.value = '```';
    await new Promise(requestAnimationFrame);
    visualChecks.push({ name: 'unfinished single fence line stays source-editable until Enter', passed: !editor.shadowRoot.querySelector('.md-code-block') });

    editor.value = '| A | B |\n| --- | --- |\n| Cell 1 | Cell 2 |';
    const tableCellOffset = editor.value.indexOf('Cell 2') + 'Cell 2'.length;
    editor.setSelectionRange(tableCellOffset, tableCellOffset);
    editor.exec('editor.smartEnter');
    visualChecks.push({
      name: 'Enter in table source inserts row below instead of inside cell',
      passed: editor.value === '| A | B |\n| --- | --- |\n| Cell 1 | Cell 2 |\n|  |  |'
    });
    visualChecks.push({
      name: 'Enter in table source places cursor in new first cell',
      passed: editor.selectionStart === editor.value.lastIndexOf('|  |  |') + 2 && editor.selectionEnd === editor.selectionStart

    const tableAOffset = keyboardTable.indexOf('A');
    const tableBOffset = keyboardTable.indexOf('B');
    const tableCOffset = keyboardTable.indexOf('C');
    editor.setSelectionRange(tableAOffset + 1, tableAOffset + 1);
    const arrowRightMovesToNextCell = pressLiveKey('ArrowRight');
    visualChecks.push({ name: 'ArrowRight at live table cell end moves to next cell', passed: arrowRightMovesToNextCell && editor.selectionStart === tableBOffset && editor.selectionEnd === tableBOffset });

    editor.setSelectionRange(tableBOffset, tableBOffset);
    const arrowLeftMovesToPreviousCell = pressLiveKey('ArrowLeft');
    visualChecks.push({ name: 'ArrowLeft at live table cell start moves to previous cell end', passed: arrowLeftMovesToPreviousCell && editor.selectionStart === tableAOffset + 1 && editor.selectionEnd === tableAOffset + 1 });

    editor.setSelectionRange(tableAOffset, tableAOffset);
    const arrowDownMovesToBodyCell = pressLiveKey('ArrowDown');
    visualChecks.push({ name: 'ArrowDown in live table moves to same-column body cell', passed: arrowDownMovesToBodyCell && editor.selectionStart === tableCOffset && editor.selectionEnd === tableCOffset });

    editor.setSelectionRange(tableCOffset, tableCOffset);
    const arrowUpMovesToHeaderCell = pressLiveKey('ArrowUp');
    visualChecks.push({ name: 'ArrowUp in live table moves to same-column header cell', passed: arrowUpMovesToHeaderCell && editor.selectionStart === tableAOffset && editor.selectionEnd === tableAOffset });

    editor.setSelectionRange(tableBOffset, tableBOffset);
    const tableEndMovesToCellEnd = pressLiveKey('End');
    visualChecks.push({ name: 'End in live table cell moves to cell end', passed: tableEndMovesToCellEnd && editor.selectionStart === tableBOffset + 1 && editor.selectionEnd === tableBOffset + 1 });

    editor.setSelectionRange(tableBOffset + 1, tableBOffset + 1);
    const tableHomeMovesToCellStart = pressLiveKey('Home');
    visualChecks.push({ name: 'Home in live table cell moves to cell start', passed: tableHomeMovesToCellStart && editor.selectionStart === tableBOffset && editor.selectionEnd === tableBOffset });

    const escapedCellTable = '| A | B |\n| --- | --- |\n| a\\|b | c |';
    editor.value = escapedCellTable;
    await new Promise(requestAnimationFrame);
    const escapedCell = editor.shadowRoot.querySelector('.md-cell[data-row="0"][data-col="0"]');
    const escapedPipeSourceOffset = escapedCellTable.indexOf('a\\|b') + 3;
    const escapedPipeDisplayOffset = editor._displayOffsetFromSourceOffset(escapedCell, escapedPipeSourceOffset);
    const escapedPipeRoundTrip = editor._sourceOffsetFromDisplayOffset(escapedCell, escapedPipeDisplayOffset);
    const escapedPipeDomPosition = editor._domPositionFromSource(escapedPipeSourceOffset);
    const escapedPipeDomRoundTrip = editor._sourceOffsetFromDom(escapedPipeDomPosition.editable, escapedPipeDomPosition.node, escapedPipeDomPosition.offset);
    visualChecks.push({
      name: 'Escaped live table pipe maps between source and displayed offsets',
      passed: escapedPipeDisplayOffset === 2 && escapedPipeRoundTrip === escapedPipeSourceOffset && escapedPipeDomRoundTrip === escapedPipeSourceOffset
    });

    editor.mode = 'live';
    editor.preview = 'none';
    await new Promise(requestAnimationFrame);
    let renderEvents = 0;
    const countRender = () => { renderEvents += 1; };
    editor.addEventListener('md-render', countRender);
    const previewBeforeHiddenChange = editor.shadowRoot.querySelector('.preview').innerHTML;
    editor.value = '**hidden preview**';
    await new Promise(resolve => setTimeout(resolve, 140));
    visualChecks.push({
      name: 'Hidden preview is marked dirty without rendering HTML',
      passed: renderEvents === 0 && editor._previewDirty === true && editor.shadowRoot.querySelector('.preview').innerHTML === previewBeforeHiddenChange
    });
    editor.preview = 'below';
    await new Promise(requestAnimationFrame);
    visualChecks.push({
      name: 'Dirty preview renders when preview becomes visible',
      passed: renderEvents === 1 && editor._previewDirty === false && editor.shadowRoot.querySelector('.preview strong')?.textContent === 'hidden preview'
    });
    editor.removeEventListener('md-render', countRender);
    editor.preview = 'none';

    editor.value = 'zero\none\ntwo\nthree\nfour';
    await new Promise(requestAnimationFrame);
    const firstNodeBeforePatch = editor.shadowRoot.querySelector('[data-from="0"]');
    const twoOffset = editor.value.indexOf('two');
    editor.setSelectionRange(twoOffset + 3, twoOffset + 3);
    const twoLine = editor.shadowRoot.querySelector(`[data-from="${twoOffset}"]`);
    twoLine.textContent = 'twos';
    twoLine.dispatchEvent(new InputEvent('input', { inputType: 'insertText', data: 's', bubbles: true }));
    await new Promise(requestAnimationFrame);
    visualChecks.push({
      name: 'Simple live text edit uses incremental block parse',
      passed: editor.value === 'zero\none\ntwos\nthree\nfour' && editor._lastParseMode === 'incremental'
    });
    visualChecks.push({
      name: 'Dirty live render preserves unaffected DOM nodes',
      passed: editor.shadowRoot.querySelector('[data-from="0"]') === firstNodeBeforePatch
    });
    visualChecks.push({
      name: 'Live editable index is rebuilt after dirty patch',
      passed: editor._liveEditables().length === 5 && editor._liveNavigationEditables().length === 5
    });

    const largeLines = Array.from({ length: 3000 }, (_, i) => `line ${String(i).padStart(4, '0')}`);
    editor.style.setProperty('--md-editor-max-height', '300px');
    editor.value = largeLines.join('\n');
    await new Promise(requestAnimationFrame);
    const renderedLargeEditables = editor.shadowRoot.querySelectorAll('[data-editable]').length;
    visualChecks.push({
      name: 'Large live document uses virtualized block window',
      passed: editor._virtualState.active && editor._liveBlocks.length === 3000 && renderedLargeEditables < 800
    });
    editor.setSelectionRange(editor.value.length, editor.value.length);
    visualChecks.push({
      name: 'Virtualized live document can render selection near document end',
      passed: editor._isSourceOffsetRendered(editor.value.length) && editor.shadowRoot.querySelectorAll('[data-editable]').length < 800
    });
    const farVirtualSelectionEnd = largeLines.slice(0, 320).join('\n').length;
    let largeSelectionRestoreThrew = false;
    try {
      editor.setSelectionRange(0, farVirtualSelectionEnd);
    } catch {
      largeSelectionRestoreThrew = true;
    }
    visualChecks.push({
      name: 'Virtualized oversized selection restore does not throw',
      passed: !largeSelectionRestoreThrew && editor.selectionStart === 0 && editor.selectionEnd === farVirtualSelectionEnd
    });
    editor.style.removeProperty('--md-editor-max-height');
    editor.value = '';
    await new Promise(requestAnimationFrame);

    editor.value = '';
    await new Promise(requestAnimationFrame);
    editor.setSelectionRange(0, 0);
    const enterFromEmpty = pressLiveKey('Enter');
    await new Promise(requestAnimationFrame);
    const secondBlankLine = editor.shadowRoot.querySelector('[data-editable][data-from="1"]');
    secondBlankLine.textContent = '#';
    const hashText = secondBlankLine.firstChild;
    const hashRange = document.createRange();
    hashRange.setStart(hashText, hashText.nodeValue.length);
    hashRange.collapse(true);
    const hashSelection = editor.shadowRoot.getSelection();
    hashSelection.removeAllRanges();
    hashSelection.addRange(hashRange);
    secondBlankLine.dispatchEvent(new InputEvent('input', { inputType: 'insertText', data: '#', bubbles: true }));
    const headingShortcutAfterBlankEnter = pressLiveKey(' ');
    await new Promise(requestAnimationFrame);
    visualChecks.push({
      name: 'Heading shortcut works after Enter in an empty editor',
      passed: enterFromEmpty && headingShortcutAfterBlankEnter && editor.value === '\n# ' && Boolean(editor.shadowRoot.querySelector('.md-heading'))
    });

    for (const check of visualChecks) {
      results.push({ name: check.name, expected: 'true', actual: String(check.passed), passed: check.passed });
    }

    const passed = results.filter(result => result.passed).length;
    const summary = document.querySelector('#summary');
    summary.innerHTML = `<h2 id="test-summary" class="${passed === results.length ? 'pass' : 'fail'}">${passed}/${results.length} passing</h2>`;
    const tbody = document.querySelector('#results');
    tbody.innerHTML = results.map(result => `
      <tr>
        <td class="${result.passed ? 'pass' : 'fail'}">${result.passed ? 'PASS' : 'FAIL'}</td>
        <td>${escapeHtml(result.name)}</td>
        <td><pre>${escapeHtml(result.expected)}</pre></td>
        <td><pre>${escapeHtml(result.actual)}</pre></td>
      </tr>
    `).join('');
    document.body.dataset.passed = String(passed);
    document.body.dataset.total = String(results.length);
    document.body.dataset.ok = String(passed === results.length);

    function escapeHtml(value) {
      return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
